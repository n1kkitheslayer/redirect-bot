<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выберите действие</title>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-telegram {
      background: #0088cc;
      color: white;
    }
    .btn-random {
      background: #28a745;
      color: white;
    }
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0088cc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Добро пожаловать!</h1>
    <p class="subtitle">Выберите, куда перейти:</p>
    
    <div id="loader" class="loader"></div>
    
    <div id="buttons" style="display: none;">
      <a href="https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe" class="btn btn-telegram">
        💬 Открыть Telegram бота
      </a>
      
      <button onclick="goToRandom()" class="btn btn-random">
        🎲 Случайный сайт
      </button>
    </div>
    
    <div class="info">
      <strong>Информация:</strong><br>
      <span id="ua-info">Загрузка...</span>
    </div>
  </div>

  <script>
    const ua = navigator.userAgent || '';
    const vendor = navigator.vendor || '';
    
    // Показываем User-Agent для отладки
    document.getElementById('ua-info').textContent = ua.substring(0, 100) + '...';
    
    const sites = [
      'https://www.google.com',
      'https://www.youtube.com',
      'https://vk.com',
      'https://dzen.ru'
    ];
    
    // Проверяем Telegram
    const isTelegram = 
      /Telegram/i.test(ua) || 
      /TelegramBot/i.test(ua) ||
      /wv/.test(ua);
    
    // Скрываем загрузчик, показываем кнопки
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('buttons').style.display = 'block';
      
      // Если определили Telegram — автоматически переходим через 2 секунды
      if (isTelegram) {
        document.querySelector('.subtitle').textContent = 'Обнаружен Telegram! Перенаправление...';
        setTimeout(() => {
          window.location.href = 'https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe';
        }, 2000);
      } else {
        document.querySelector('.subtitle').textContent = 'Выберите действие:';
      }
    }, 1000);
    
    function goToRandom() {
      const randomIndex = Math.floor(Math.random() * sites.length);
      window.location.replace(sites[randomIndex]);
    }
  </script>
</body>
</html>
